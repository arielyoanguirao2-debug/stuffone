<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aperçu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:black;
  font-family:'DM Mono', monospace;
  color:white;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* =========================================
   TOPBAR
========================================= */

.topbar{
  width:100%;
  height:60px;
  padding:0 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;
  position:relative;
  z-index:100;
}

.topbar-title{
  font-size:13px;
  color:rgba(255,255,255,0.4);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:60%;
}

.topbar-title span{
  color:white;
}

/* =========================================
   TABS
========================================= */

.tabs{
  display:flex;
  align-items:center;
  gap:4px;
  background:#111;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;
  padding:4px;
}

.tab-btn{
  padding:6px 14px;
  border-radius:7px;
  border:none;
  background:transparent;
  color:rgba(255,255,255,0.35);
  font-family:'DM Mono', monospace;
  font-size:11px;
  cursor:pointer;
  transition:0.2s;
  white-space:nowrap;
}

.tab-btn.active{
  background:#1c1c1c;
  color:white;
}

/* =========================================
   MENU BUTTON
========================================= */

.menu-btn{
  width:38px;
  height:38px;
  border-radius:10px;
  background:#111;
  border:1px solid rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
}

.menu-dots{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.menu-dots span{
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
}

/* =========================================
   DROPDOWN
========================================= */

.dropdown{
  position:absolute;
  top:68px;
  right:18px;
  width:200px;
  background:#111;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  overflow:hidden;
  display:none;
  z-index:200;
}

.dropdown.show{
  display:block;
}

.dropdown button{
  width:100%;
  padding:14px 16px;
  background:none;
  border:none;
  border-bottom:1px solid rgba(255,255,255,0.04);
  color:white;
  text-align:left;
  cursor:pointer;
  font-family:'DM Mono', monospace;
  font-size:12px;
  transition:0.15s;
  display:flex;
  align-items:center;
  gap:10px;
}

.dropdown button:last-child{
  border-bottom:none;
}

.dropdown button:hover{
  background:#1c1c1c;
}

.dropdown button .icon{
  opacity:0.4;
  font-size:14px;
}

/* =========================================
   CONTENT AREA
========================================= */

.content{
  flex:1;
  overflow:hidden;
  position:relative;
}

/* =========================================
   PREVIEW IFRAME
========================================= */

#preview-panel{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

#preview-frame{
  width:100%;
  height:100%;
  border:none;
  background:white;
  display:none;
}

.preview-empty{
  color:#333;
  font-size:13px;
  text-align:center;
  line-height:2;
}

/* =========================================
   CODE PANEL
========================================= */

#code-panel{
  width:100%;
  height:100%;
  display:none;
  flex-direction:column;
}

.code-tabs{
  display:flex;
  border-bottom:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;
}

.code-tab{
  padding:10px 20px;
  font-family:'DM Mono', monospace;
  font-size:11px;
  border:none;
  background:transparent;
  color:rgba(255,255,255,0.3);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:0.15s;
}

.code-tab.active{
  color:white;
  border-bottom-color:white;
}

.code-blocks{
  flex:1;
  overflow:hidden;
  position:relative;
}

.code-block{
  display:none;
  width:100%;
  height:100%;
  overflow:auto;
  padding:20px;
}

.code-block.active{
  display:block;
}

.code-block pre{
  font-family:'DM Mono', monospace;
  font-size:11px;
  line-height:1.8;
  color:rgba(255,255,255,0.7);
  white-space:pre-wrap;
  word-break:break-all;
}

/* =========================================
   LOADING
========================================= */

.loader{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
  z-index:50;
}

.loader-dot{
  width:6px;
  height:6px;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
  margin:0 3px;
  animation:pulse 1.2s ease-in-out infinite;
}

.loader-dot:nth-child(2){ animation-delay:0.2s; }
.loader-dot:nth-child(3){ animation-delay:0.4s; }

@keyframes pulse{
  0%,80%,100%{ transform:scale(0.7); opacity:0.3; }
  40%{ transform:scale(1); opacity:1; }
}

/* =========================================
   TOAST
========================================= */

.toast{
  position:fixed;
  bottom:28px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1c1c1c;
  border:1px solid rgba(255,255,255,0.08);
  color:white;
  padding:10px 20px;
  border-radius:10px;
  font-size:12px;
  opacity:0;
  transition:0.3s;
  pointer-events:none;
  z-index:999;
  white-space:nowrap;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-dot"></div>
  <div class="loader-dot"></div>
  <div class="loader-dot"></div>
</div>

<!-- TOPBAR -->
<header class="topbar">

  <div class="topbar-title" id="topbar-title">
    Chargement…
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('preview')">Aperçu</button>
    <button class="tab-btn" onclick="switchTab('code')">Code</button>
  </div>

  <button class="menu-btn" onclick="toggleMenu()">
    <div class="menu-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </button>

  <div class="dropdown" id="dropdown">
    <button onclick="switchTab('preview'); closeMenu()">
      <span class="icon">◻</span> Aperçu
    </button>
    <button onclick="switchTab('code'); closeMenu()">
      <span class="icon">&lt;/&gt;</span> Code source
    </button>
    <button onclick="copyAll(); closeMenu()">
      <span class="icon">⎘</span> Copier tout
    </button>
  </div>

</header>

<!-- CONTENT -->
<div class="content">

  <!-- PREVIEW -->
  <div id="preview-panel">
    <div class="preview-empty" id="preview-empty">Aperçu de la structure</div>
    <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>

  <!-- CODE -->
  <div id="code-panel">
    <div class="code-tabs">
      <button class="code-tab active" onclick="switchCode('html')">HTML</button>
      <button class="code-tab" onclick="switchCode('css')">CSS</button>
      <button class="code-tab" onclick="switchCode('js')">JS</button>
    </div>
    <div class="code-blocks">
      <div class="code-block active" id="block-html"><pre id="code-html"></pre></div>
      <div class="code-block" id="block-css"><pre id="code-css"></pre></div>
      <div class="code-block" id="block-js"><pre id="code-js"></pre></div>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

const API = "https://stuffone-backend-production.up.railway.app";

let structureData = null;
let currentTab    = "preview";
let currentCode   = "html";

/* =========================================
   INIT
========================================= */

async function init(){

  // Récupérer l'ID depuis l'URL: preview.html?id=123
  const params = new URLSearchParams(window.location.search);
  const id     = params.get("id");

  if(!id){
    hideLoader();
    document.getElementById("topbar-title").textContent = "Aucun ID fourni";
    document.getElementById("preview-empty").textContent = "Aucune structure sélectionnée.";
    return;
  }

  try{

    const resp = await fetch(`${API}/structures/${id}/code`);
    const data = await resp.json();

    if(!data.success){
      throw new Error("Structure introuvable");
    }

    // Récupérer le titre
    const metaResp = await fetch(`${API}/structures/${id}`);
    const meta     = await metaResp.json();

    structureData = data;

    // Titre topbar
    const titleEl = document.getElementById("topbar-title");
    titleEl.innerHTML = `<span>${meta.title || "Structure #"+id}</span>`;

    // Remplir les blocs de code
    document.getElementById("code-html").textContent = data.html || "(vide)";
    document.getElementById("code-css").textContent  = data.css  || "(vide)";
    document.getElementById("code-js").textContent   = data.js   || "(vide)";

    // Render dans l'iframe
    renderPreview(data.html, data.css, data.js);

    hideLoader();

  }catch(e){
    hideLoader();
    document.getElementById("topbar-title").textContent = "Erreur";
    document.getElementById("preview-empty").textContent = e.message;
  }

}

/* =========================================
   RENDER PREVIEW
========================================= */

function renderPreview(html, css, js){

  const doc = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *{ box-sizing:border-box; }
  ${css || ""}
</style>
</head>
<body>
${html || ""}
<script>
try{ ${js || ""} }catch(e){}
<\/script>
</body>
</html>`;

  const frame = document.getElementById("preview-frame");
  frame.srcdoc = doc;
  frame.style.display = "block";
  document.getElementById("preview-empty").style.display = "none";

}

/* =========================================
   TABS
========================================= */

function switchTab(tab){

  currentTab = tab;

  // Update tab buttons
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  event?.target?.classList?.add("active");

  // Sync manuellement si appelé depuis dropdown
  document.querySelectorAll(".tab-btn").forEach(b => {
    if(b.textContent.trim().toLowerCase() === tab ||
       (tab === "preview" && b.textContent.includes("Aperçu")) ||
       (tab === "code"    && b.textContent.includes("Code"))){
      b.classList.add("active");
    }
  });

  document.getElementById("preview-panel").style.display = tab === "preview" ? "flex"  : "none";
  document.getElementById("code-panel").style.display    = tab === "code"    ? "flex"  : "none";

}

function switchCode(lang){

  currentCode = lang;

  document.querySelectorAll(".code-tab").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".code-block").forEach(b => b.classList.remove("active"));

  event.target.classList.add("active");
  document.getElementById("block-" + lang).classList.add("active");

}

/* =========================================
   COPY
========================================= */

function copyAll(){

  if(!structureData){ showToast("Rien à copier"); return; }

  const full =
    `<!-- HTML -->\n${structureData.html}\n\n` +
    `/* CSS */\n${structureData.css}\n\n` +
    `/* JS */\n${structureData.js}`;

  navigator.clipboard.writeText(full)
    .then(() => showToast("Code copié !"))
    .catch(()  => showToast("Erreur copie"));

}

/* =========================================
   MENU
========================================= */

function toggleMenu(){
  document.getElementById("dropdown").classList.toggle("show");
}

function closeMenu(){
  document.getElementById("dropdown").classList.remove("show");
}

document.addEventListener("click", e => {
  if(!e.target.closest(".menu-btn") && !e.target.closest(".dropdown")){
    closeMenu();
  }
});

/* =========================================
   LOADER / TOAST
========================================= */

function hideLoader(){
  document.getElementById("loader").style.display = "none";
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

/* =========================================
   START
========================================= */

init();

</script>
</body>
</html>
