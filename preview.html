<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aperçu</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:black;
  font-family:'DM Mono', monospace;
  color:white;
}

/* =========================================
   TOPBAR
========================================= */

.topbar{
  width:100%;
  height:70px;

  padding:0 18px;

  display:flex;
  align-items:center;
  justify-content:flex-end;

  border-bottom:1px solid rgba(255,255,255,0.06);

  position:relative;
}

/* =========================================
   MENU BUTTON
========================================= */

.menu-btn{
  width:42px;
  height:42px;

  border-radius:12px;

  background:#111;

  border:1px solid rgba(255,255,255,0.06);

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;
}

.menu-dots{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.menu-dots span{
  width:4px;
  height:4px;

  background:white;

  border-radius:50%;
}

/* =========================================
   DROPDOWN
========================================= */

.dropdown{
  position:absolute;

  top:80px;
  right:18px;

  width:220px;

  background:#111;

  border:1px solid rgba(255,255,255,0.06);

  border-radius:16px;

  overflow:hidden;

  display:none;
}

.dropdown.show{
  display:block;
}

.dropdown button{
  width:100%;

  padding:16px;

  background:none;

  border:none;

  color:white;

  text-align:left;

  cursor:pointer;

  font-family:'DM Mono', monospace;

  transition:0.2s;
}

.dropdown button:hover{
  background:#1c1c1c;
}

/* =========================================
   PREVIEW AREA
========================================= */

.preview{
  min-height:calc(100vh - 70px);

  display:flex;
  align-items:center;
  justify-content:center;

  color:#444;

  font-size:14px;
}

</style>
</head>

<body>

<header class="topbar">

<button
class="menu-btn"
onclick="toggleMenu()"
>

<div class="menu-dots">
<span></span>
<span></span>
<span></span>
</div>

</button>

<div
class="dropdown"
id="dropdown"
>

<button>
Voir le code source
</button>

<button>
Aperçu
</button>

<button>
Copier
</button>

</div>

</header>

<div class="preview">

Aperçu de la structure

</div>

<script>

function toggleMenu(){

const dropdown =
document.getElementById("dropdown");

dropdown.classList.toggle("show");

}

</script>

</body>
</html>
