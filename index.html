<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StuffOne</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* =========================================
   RESET
========================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#0a0a0a;
  color:#f5f5f5;
  overflow-x:hidden;
  font-family:'DM Mono', monospace;
}

/* =========================================
   TOKENS
========================================= */

:root{

  --bg:#0a0a0a;
  --surface:#111111;
  --card:#161616;

  --border:rgba(255,255,255,0.06);

  --text:#f5f5f5;
  --muted:#7d7d7d;

  --accent:#e8ff47;

  --transition:0.22s cubic-bezier(0.4,0,0.2,1);

}

/* =========================================
   TOPBAR
========================================= */

.topbar{
  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:75px;

  padding:0 16px;

  display:flex;
  align-items:center;
  gap:14px;

  background:rgba(10,10,10,0.82);

  backdrop-filter:blur(16px);

  border-bottom:1px solid var(--border);

  z-index:1000;
}

/* =========================================
   BURGER BUTTON
========================================= */

.burger-btn{
  width:42px;
  height:42px;

  border-radius:12px;

  border:1px solid var(--border);

  background:var(--surface);

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  transition:var(--transition);

  flex-shrink:0;
}

.burger-btn:hover{
  background:#1b1b1b;
}

.burger-lines{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.burger-lines span{
  width:16px;
  height:2px;

  background:white;

  border-radius:999px;
}

/* =========================================
   SEARCH BAR
========================================= */

.search{
  flex:1;
  position:relative;
}

.search input{
  width:100%;
  height:44px;

  padding-left:46px;
  padding-right:16px;

  border-radius:999px;

  background:var(--surface);

  border:1px solid var(--border);

  color:var(--text);

  font-size:13px;

  transition:var(--transition);
}

.search input:focus{
  border-color:rgba(255,255,255,0.14);
}

/* =========================================
   CSS LOUPE
========================================= */

.search-icon{
  position:absolute;

  top:50%;
  left:16px;

  transform:translateY(-50%);
}

.loupe{
  width:14px;
  height:14px;

  border:2px solid #777;
  border-radius:50%;

  position:relative;
}

.loupe::after{
  content:"";

  position:absolute;

  width:7px;
  height:2px;

  background:#777;

  bottom:-4px;
  right:-5px;

  transform:rotate(45deg);

  border-radius:999px;
}

/* =========================================
   SIDEBAR
========================================= */

.sidebar{
  position:fixed;

  top:0;
  left:0;

  width:260px;
  height:100vh;

  background:#0d0d0d;

  border-right:1px solid var(--border);

  z-index:2000;

  transform:translateX(-100%);

  transition:0.35s ease;

  padding:22px;
}

.sidebar.open{
  transform:translateX(0);
}

/* =========================================
   OVERLAY
========================================= */

.overlay{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,0.6);

  opacity:0;
  visibility:hidden;

  transition:0.3s ease;

  z-index:1500;
}

.overlay.active{
  opacity:1;
  visibility:visible;
}

/* =========================================
   SIDEBAR CONTENT
========================================= */

.logo{
  font-family:'Syne', sans-serif;

  font-size:26px;
  font-weight:800;

  margin-bottom:40px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.menu button{
  width:100%;

  padding:14px;

  border-radius:14px;

  background:#151515;

  border:1px solid var(--border);

  color:white;

  text-align:left;

  cursor:pointer;

  transition:var(--transition);
}

.menu button:hover{
  background:#1c1c1c;
}

/* =========================================
   MAIN
========================================= */

main{
  padding-top:95px;
}

/* =========================================
   SECTION
========================================= */

.section{
  width:100%;

  min-height:100vh;

  padding:40px 24px;

  border-bottom:1px solid rgba(255,255,255,0.04);
}

/* =========================================
   SECTION HEADER
========================================= */

.section-header{
  margin-bottom:32px;
}

.section-title{
  font-family:'Syne', sans-serif;

  font-size:42px;
  font-weight:800;

  margin-bottom:10px;
}

.section-subtitle{
  color:var(--muted);

  font-size:13px;
}

/* =========================================
   GRID
========================================= */

.grid{
  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(280px,1fr));

  gap:20px;
}

/* =========================================
   OLD CARD STYLE
========================================= */

.card{
  background:#161616;

  border:1px solid rgba(255,255,255,0.06);

  border-radius:14px;

  overflow:hidden;

  transition:0.22s cubic-bezier(0.4,0,0.2,1);

  position:relative;
}

.card:hover{
  transform:translateY(-3px);

  border-color:rgba(255,255,255,0.15);

  background:#1c1c1c;

  box-shadow:0 16px 40px rgba(0,0,0,0.5);
}

/* =========================================
   CARD IMAGE
========================================= */

.card-image{
  aspect-ratio:16/9;

  background:
  radial-gradient(
  ellipse at 30% 40%,
  rgba(232,255,71,0.14) 0%,
  transparent 60%
  ),
  #111;

  display:flex;
  align-items:center;
  justify-content:center;

  position:relative;

  overflow:hidden;
}

.card-image::before{
  content:"";

  position:absolute;
  inset:0;

  background:
  linear-gradient(
  rgba(255,255,255,0.04) 1px,
  transparent 1px),

  linear-gradient(
  90deg,
  rgba(255,255,255,0.04) 1px,
  transparent 1px);

  background-size:20px 20px;
}

.card-image span{
  font-family:'Syne', sans-serif;

  font-size:42px;
  font-weight:800;

  opacity:0.12;
}

/* =========================================
   CLICKABLE PREVIEW
========================================= */

.clickable-preview{
  cursor:pointer;
}

/* =========================================
   CARD BODY
========================================= */

.card-body{
  padding:18px;
}

.card-tag{
  display:inline-block;

  margin-bottom:14px;

  padding:6px 10px;

  border-radius:999px;

  background:rgba(232,255,71,0.08);

  color:#e8ff47;

  border:1px solid rgba(232,255,71,0.2);

  font-size:10px;

  text-transform:uppercase;
}

.card-title{
  font-family:'Syne', sans-serif;

  font-size:20px;
  font-weight:700;

  margin-bottom:10px;
}

.card-text{
  color:#777;

  font-size:12px;

  line-height:1.6;
}

/* =========================================
   COPY BUTTON
========================================= */

.copy-btn{
  margin-top:18px;

  width:100%;

  height:42px;

  border-radius:12px;

  background:#1d1d1d;

  border:1px solid rgba(255,255,255,0.06);

  color:white;

  font-family:'DM Mono', monospace;
  font-size:11px;

  cursor:pointer;

  transition:0.22s cubic-bezier(0.4,0,0.2,1);
}

.copy-btn:hover{
  background:#252525;

  border-color:rgba(255,255,255,0.14);

  transform:translateY(-2px);
}

.copy-btn:active{
  transform:scale(0.98);
}

/* =========================================
   RESPONSIVE
========================================= */

@media(max-width:700px){

  .section-title{
    font-size:32px;
  }

}

</style>
</head>

<body>

<!-- =====================================
     TOPBAR
===================================== -->

<header class="topbar">

  <!-- burger -->
  <button class="burger-btn" onclick="toggleSidebar()">

    <div class="burger-lines">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </button>

  <!-- search -->
  <div class="search">

    <input
      type="text"
      placeholder="Rechercher une structure..."
    >

    <div class="search-icon">
      <div class="loupe"></div>
    </div>

  </div>

</header>

<!-- =====================================
     OVERLAY
===================================== -->

<div
class="overlay"
id="overlay"
onclick="toggleSidebar()"
></div>

<!-- =====================================
     SIDEBAR
===================================== -->

<aside class="sidebar" id="sidebar">

  <div class="logo">
    StuffOne
  </div>

  <div class="menu">

    <button>Toutes les structures</button>

    <button>Landing Pages</button>

    <button>Dashboards</button>

    <button>UI Mobiles</button>

    <button>Portfolios</button>

  </div>

</aside>

<!-- =====================================
     MAIN
===================================== -->

<main>

  <section class="section">

    <div class="section-header">

      <h1 class="section-title">
        Toutes Les Structures
      </h1>

      <p class="section-subtitle">
        Bibliothèque moderne de structures UI.
      </p>

    </div>

    <!-- GRID VIDE -->

    <div class="grid">

    </div>

  </section>

</main>

<!-- =====================================
     BACKEND CONNECT
===================================== -->

<script>

const API_URL =
"https://stuffone-backend.onrender.com";

async function loadStructures(){

  try{

    const response =
    await fetch(API_URL + "/structures");

    const data =
    await response.json();

    console.log(data);

  }catch(error){

    console.log(
      "Erreur backend :",
      error
    );

  }

}

loadStructures();

/* =====================================
   SIDEBAR
===================================== */

function toggleSidebar(){

  const sidebar =
  document.getElementById("sidebar");

  const overlay =
  document.getElementById("overlay");

  sidebar.classList.toggle("open");

  overlay.classList.toggle("active");

}

</script>

</body>
</html>
