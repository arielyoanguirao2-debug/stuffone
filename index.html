<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StuffOne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* =========================================
       RESET
    ========================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* =========================================
       VARIABLES
    ========================================= */
    :root {
      --bg: #0a0a0a;
      --surface: #121212;
      --card: #161616;
      --border: rgba(255, 255, 255, 0.06);
      --text: #f5f5f5;
      --muted: #7b7b7b;
      --accent: #e8ff47;
    }

    /* =========================================
       TOPBAR
    ========================================= */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 72px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      background: rgba(10, 10, 10, 0.84);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }

    /* =========================================
       BURGER
    ========================================= */
    .burger-btn {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      border: none;
      border-radius: 12px;
      background: #171717;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .burger-lines {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .burger-lines span {
      width: 16px;
      height: 2px;
      background: white;
      border-radius: 999px;
    }

    /* =========================================
       SEARCH
    ========================================= */
    .search {
      flex: 1;
      position: relative;
    }

    .search input {
      width: 100%;
      height: 44px;
      border: none;
      outline: none;
      border-radius: 999px;
      background: #171717;
      border: 1px solid var(--border);
      color: white;
      padding-left: 44px;
      padding-right: 14px;
      font-size: 13px;
    }

    .search-icon {
      position: absolute;
      top: 50%;
      left: 15px;
      transform: translateY(-50%);
    }

    .loupe {
      width: 14px;
      height: 14px;
      border: 2px solid #777;
      border-radius: 50%;
      position: relative;
    }

    .loupe::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 2px;
      background: #777;
      right: -5px;
      bottom: -3px;
      transform: rotate(45deg);
      border-radius: 999px;
    }

    /* =========================================
       SIDEBAR
    ========================================= */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      max-width: 85%;
      height: 100vh;
      background: #0d0d0d;
      border-right: 1px solid var(--border);
      z-index: 2000;
      padding: 22px;
      transform: translateX(-100%);
      transition: 0.3s ease;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 40px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu button {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 14px;
      background: #171717;
      border: 1px solid var(--border);
      color: white;
      text-align: left;
      padding: 0 14px;
      cursor: pointer;
    }

    /* =========================================
       OVERLAY
    ========================================= */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      opacity: 0;
      visibility: hidden;
      transition: 0.3s ease;
      z-index: 1500;
    }

    .overlay.active {
      opacity: 1;
      visibility: visible;
    }

    /* =========================================
       MAIN
    ========================================= */
    main {
      padding-top: 90px;
      width: 100%;
    }

    /* =========================================
       SECTION
    ========================================= */
    .section {
      width: 100%;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* =========================================
       HEADER
    ========================================= */
    .section-header {
      margin-bottom: 28px;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 800;
      margin-bottom: 10px;
    }

    .section-subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    /* =========================================
       GRID
    ========================================= */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    /* =========================================
       CARD
    ========================================= */
    .card {
      background: #161616;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: 0.22s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.12);
    }

    /* =========================================
       CARD IMAGE
    ========================================= */
    .card-image {
      width: 100%;
      aspect-ratio: 16/9;
      background: radial-gradient(circle at top left, rgba(232, 255, 71, 0.16), transparent 60%), #111;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
    }

    .card-image::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .card-image span {
      font-family: 'Syne', sans-serif;
      font-size: 44px;
      font-weight: 800;
      opacity: 0.12;
    }

    /* =========================================
       CARD BODY
    ========================================= */
    .card-body {
      padding: 18px;
    }

    .card-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(232, 255, 71, 0.08);
      border: 1px solid rgba(232, 255, 71, 0.2);
      color: #e8ff47;
      font-size: 10px;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .card-text {
      color: #777;
      font-size: 12px;
      line-height: 1.6;
    }

    /* =========================================
       COPY BUTTON
    ========================================= */
    .copy-btn {
      width: 100%;
      height: 42px;
      margin-top: 18px;
      border: none;
      border-radius: 12px;
      background: #1d1d1d;
      border: 1px solid var(--border);
      color: white;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
    }

    .copy-btn:active {
      transform: scale(0.98);
    }

    /* =========================================
       MOBILE
    ========================================= */
    @media(max-width:500px) {
      .section {
        padding: 20px 12px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <button class="burger-btn" onclick="toggleSidebar()">
      <div class="burger-lines">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </button>

    <div class="search">
      <input type="text" placeholder="Rechercher une structure...">
      <div class="search-icon">
        <div class="loupe"></div>
      </div>
    </div>
  </header>

  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="logo">StuffOne</div>
    <div class="menu">
      <button>Toutes les structures</button>
      <button>Landing Pages</button>
      <button>Dashboards</button>
      <button>UI Mobiles</button>
      <button>Portfolios</button>
    </div>
  </aside>

  <main>
    <section class="section">
      <div class="section-header">
        <h1 class="section-title">Toutes Les Structures</h1>
        <p class="section-subtitle">Bibliothèque moderne de structures UI.</p>
      </div>
      <div class="grid"></div>
    </section>
  </main>

  <script>
    /* =========================================
       API
    ========================================= */
    const API_URL = "https://stuffone-backend-production.up.railway.app";

    /* =========================================
       LOAD STRUCTURES
    ========================================= */
    async function loadStructures() {
      try {
        const response = await fetch(API_URL + "/structures");
        const data = await response.json();
        const grid = document.querySelector(".grid");

        grid.innerHTML = "";

        if (!Array.isArray(data)) {
          grid.innerHTML = "<p>Erreur serveur.</p>";
          return;
        }

        if (data.length === 0) {
          grid.innerHTML = `
          <div style="color:#666; font-size:13px;">
            Aucune structure disponible.
          </div>
          `;
          return;
        }

        data.forEach(structure => {
          const title = structure.title || "Sans titre";
          const category = structure.category || "Structure";
          const id = structure.id;

          const card = document.createElement("article");
          card.className = "card";

          // Squelette HTML de la carte avec des classes cibles spécifiques
          card.innerHTML = `
          <div class="card-image">
            <span class="card-initial"></span>
          </div>
          <div class="card-body">
            <div class="card-tag"></div>
            <h2 class="card-title"></h2>
            <p class="card-text">
              Structure uploadée sur StuffOne.
            </p>
            <button class="copy-btn">
              Copier le code
            </button>
          </div>
          `;

          // Injection sécurisée des textes pour éviter les injections de code ou débordements
          card.querySelector(".card-initial").textContent = title.charAt(0);
          card.querySelector(".card-tag").textContent = category;
          card.querySelector(".card-title").textContent = title;

          // Event : Redirection vers la preview
          const preview = card.querySelector(".card-image");
          preview.addEventListener("click", () => {
            window.location.href = "preview.html?id=" + id;
          });

          // Event : Copie du code
          const copyBtn = card.querySelector(".copy-btn");
          copyBtn.addEventListener("click", async (event) => {
            event.stopPropagation();
            try {
              const response = await fetch(API_URL + "/structures/" + id + "/code");
              const data = await response.json();

              const fullCode =
                data.html +
                "\n<style>\n" +
                data.css +
                "\n</style>\n" +
                "\n<script>\n" +
                data.js +
                "\n<\/script>";

              await navigator.clipboard.writeText(fullCode);
              alert("Code copié !");
            } catch (error) {
              console.log(error);
            }
          });

          grid.appendChild(card);
        });

      } catch (error) {
        console.log(error);
      }
    }

    /* =========================================
       SIDEBAR
    ========================================= */
    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");

      sidebar.classList.toggle("open");
      overlay.classList.toggle("active");
    }

    /* =========================================
       START
    ========================================= */
    loadStructures();
  </script>

</body>
</html>

```
